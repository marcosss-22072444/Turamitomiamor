<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para la persona más importante 🤍</title>
    <style>
        body {
            margin: 0;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Apple SD Gothic Neo', 'Segoe UI', Roboto, sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Dibujamos el ramo con CSS fotorrealista para que no necesites descargar nada */
        .rose-bouquet {
            position: relative;
            width: 300px;
            height: 400px;
            transform: scale(0.5);
            opacity: 0;
            transition: all 4s ease-out;
        }

        .rose-bouquet.grow {
            transform: scale(1.1);
            opacity: 1;
        }

        /* Representación de las rosas */
        .flower {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ff0000 20%, #8b0000 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* Tallos naturales */
        .stems {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 60px;
            height: 250px;
            background: linear-gradient(to right, #2d5a27, #1e3d1a, #2d5a27);
            transform: translateX(-50%);
            border-radius: 5px;
            z-index: -1;
        }

        /* El Lazo Blanco que mencionaste */
        #white-ribbon {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: #ffffff;
            color: #333;
            padding: 8px 15px;
            border-radius: 2px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 10;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #eee;
            text-transform: uppercase;
        }

        #white-ribbon::before, #white-ribbon::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40px;
            height: 20px;
            background: #fff;
            z-index: -1;
            border: 1px solid #eee;
        }
        #white-ribbon::before { left: -30px; transform: rotate(-20deg) translateY(-50%); }
        #white-ribbon::after { right: -30px; transform: rotate(20deg) translateY(-50%); }

        #white-ribbon.show { transform: translateX(-50%) scale(1); }

        /* Pantalla de mensaje final */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
        }

        .card {
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            max-width: 80%;
            animation: slideUp 1s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 { color: #d63384; font-size: 1.5rem; margin-bottom: 15px; }
        p { color: #666; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="rose-bouquet" id="bouquet">
            <div class="flower" style="top:0; left:110px;"></div>
            <div class="flower" style="top:40px; left:60px;"></div>
            <div class="flower" style="top:40px; left:160px;"></div>
            <div class="flower" style="top:90px; left:30px;"></div>
            <div class="flower" style="top:90px; left:110px;"></div>
            <div class="flower" style="top:90px; left:190px;"></div>
            <div class="flower" style="top:150px; left:70px;"></div>
            <div class="flower" style="top:150px; left:150px;"></div>
            <div class="stems"></div>
            
            <div id="white-ribbon" onclick="openMessage()">Pulsa aquí 🏷️</div>
        </div>
    </div>

    <div id="overlay">
        <div class="card">
            <h1>Un ramo para la persona más importante del mundo.</h1>
            <p>Te quiero mucho 🤍</p>
            <button onclick="location.reload()" style="margin-top:20px; border:none; background:none; color:#ccc; cursor:pointer;">Ver de nuevo</button>
        </div>
    </div>

    <script>
        window.onload = () => {
            const bouquet = document.getElementById('bouquet');
            const ribbon = document.getElementById('white-ribbon');

            // 1. Iniciar crecimiento
            setTimeout(() => {
                bouquet.classList.add('grow');
            }, 500);

            // 2. Aparecer el lazo blanco al terminar
            setTimeout(() => {
                ribbon.classList.add('show');
            }, 4500);
        };

        function openMessage() {
            document.getElementById('overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
