<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para alguien especial 🤍</title>
    <style>
        :root {
            --color-pink: #ff85a2;
            --color-stem: #2d5a27;
            --color-bg: #fff5f7;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--color-bg);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* Contenedor del Ramo */
        .bouquet {
            position: relative;
            width: 300px;
            height: 400px;
            display: flex;
            justify-content: center;
        }

        /* Estilo de las flores (animación de crecimiento) */
        .flower {
            position: absolute;
            bottom: 50px;
            transform-origin: bottom center;
            transform: scale(0);
            animation: grow 3s forwards ease-out;
        }

        @keyframes grow {
            to { transform: scale(1); }
        }

        .stem {
            width: 8px;
            height: 200px;
            background: var(--color-stem);
            border-radius: 10px;
        }

        .petals {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 50px;
            height: 50px;
            background: var(--color-pink);
            border-radius: 50%;
            box-shadow: 30px 0 0 var(--color-pink), 
                        -30px 0 0 var(--color-pink), 
                        0 30px 0 var(--color-pink), 
                        0 -30px 0 var(--color-pink);
            animation: bloom 2s 2s forwards;
        }

        @keyframes bloom {
            from { transform: rotate(0deg) scale(0); }
            to { transform: rotate(45deg) scale(1.2); }
        }

        /* Etiqueta */
        #tag {
            position: absolute;
            bottom: 100px;
            background: #f3e5ab;
            padding: 10px 20px;
            border: 2px solid #d4c48a;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.1);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
            z-index: 10;
        }

        #tag.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #tag:hover {
            transform: scale(1.1) rotate(-5deg);
            background: #fff;
        }

        /* Mensaje Final */
        #message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
            animation: fadeIn 1s forwards;
        }

        .heart {
            color: #ff4d6d;
            font-size: 50px;
            margin-bottom: 20px;
        }

        h1 {
            color: #4a4a4a;
            font-size: 1.8rem;
            padding: 0 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="bouquet">
        <div class="flower" style="left: 100px; animation-delay: 0.5s;">
            <div class="stem" style="height: 220px;"></div>
            <div class="petals"></div>
        </div>
        <div class="flower" style="left: 140px; animation-delay: 1s;">
            <div class="stem" style="height: 250px; background: #3a7532;"></div>
            <div class="petals" style="background: #ffb3c1;"></div>
        </div>
        <div class="flower" style="left: 180px; animation-delay: 1.5s;">
            <div class="stem" style="height: 210px;"></div>
            <div class="petals" style="background: #ff4d6d;"></div>
        </div>

        <div id="tag" onclick="abrirMensaje()">Pulsa aquí 🏷️</div>
    </div>

    <div id="message-overlay">
        <div class="heart">🤍</div>
        <h1>Un ramo para la persona más importante del mundo.</h1>
        <p style="color: #888;">Te quiero mucho</p>
        <button onclick="cerrar()" style="margin-top: 30px; border: none; background: none; color: #aaa; cursor: pointer;">Cerrar</button>
    </div>

    <script>
        // Hacer que la etiqueta aparezca después de que florezca el ramo
        setTimeout(() => {
            document.getElementById('tag').classList.add('visible');
        }, 5000); // 5 segundos de espera

        function abrirMensaje() {
            document.getElementById('message-overlay').style.display = 'flex';
        }

        function cerrar() {
            document.getElementById('message-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
