<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ti 🤍</title>
    <style>
        :root {
            --bg-rosa: #ffeef2;
            --rosa-palo: #ffcad4;
            --rojo-real: #b91d1d;
            --rojo-sombra: #7f1d1d;
        }

        body {
            margin: 0;
            background-color: var(--bg-rosa);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        .canvas {
            position: relative;
            width: 350px;
            height: 500px;
            display: flex;
            justify-content: center;
        }

        /* --- EL RAMO (CONTENEDOR) --- */
        .ramo {
            position: absolute;
            bottom: 50px;
            transform: scale(0);
            transition: transform 4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .ramo.florecer { transform: scale(1); }

        /* --- LAS ROSAS DETALLADAS --- */
        .rosas-container {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: repeat(3, 40px);
            gap: 15px;
            padding-bottom: 20px;
        }

        .rosa {
            width: 60px;
            height: 60px;
            background: var(--rojo-real);
            border-radius: 50%;
            position: relative;
            box-shadow: inset -5px -5px 15px var(--rojo-sombra);
            background: radial-gradient(circle at 30% 30%, #f87171, var(--rojo-real) 80%);
        }

        /* Pétalos internos detallados */
        .rosa::before {
            content: '';
            position: absolute;
            top: 10%; left: 10%;
            width: 80%; height: 80%;
            border-radius: 50%;
            border: 2px solid rgba(127, 29, 29, 0.3);
            box-shadow: inset 10px 10px 10px rgba(0,0,0,0.2);
        }

        /* --- PAPEL BLANCO CON CORAZONES --- */
        .papel {
            position: absolute;
            bottom: -20px;
            width: 180px;
            height: 250px;
            background: #ffffff;
            clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 20% 100%);
            z-index: 1;
            /* Estampado de corazones rosa pastel */
            background-image: radial-gradient(var(--rosa-palo) 20%, transparent 20%),
                              radial-gradient(var(--rosa-palo) 20%, transparent 20%);
            background-position: 0 0, 15px 15px;
            background-size: 30px 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* --- LAZO BLANCO EN FORMA DE CORAZÓN --- */
        .lazo-corazon {
            position: absolute;
            bottom: 40px;
            width: 80px;
            height: 80px;
            background: white;
            z-index: 3;
            cursor: pointer;
            opacity: 0;
            transform: scale(0);
            transition: all 1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 10px;
            font-weight: bold;
            color: #ff85a2;
            /* Forma de corazón */
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
        }

        .rose-bouquet.grow {
            transform: scale(1.1);
            opacity: 1;
        }

        /* Representación de las rosas */
        .flower {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ff0000 20%, #8b0000 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* Tallos naturales */
        .stems {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 60px;
            height: 250px;
            background: linear-gradient(to right, #2d5a27, #1e3d1a, #2d5a27);
            transform: translateX(-50%);
            border-radius: 5px;
            z-index: -1;
        }

        /* El Lazo Blanco que mencionaste */
        #white-ribbon {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: #ffffff;
            color: #333;
            padding: 8px 15px;
            border-radius: 2px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 10;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #eee;
            text-transform: uppercase;
        }

        #white-ribbon::before, #white-ribbon::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40px;
            height: 20px;
            background: #fff;
            z-index: -1;
            border: 1px solid #eee;
        }
        #white-ribbon::before { left: -30px; transform: rotate(-20deg) translateY(-50%); }
        #white-ribbon::after { right: -30px; transform: rotate(20deg) translateY(-50%); }

        #white-ribbon.show { transform: translateX(-50%) scale(1); }

        /* Pantalla de mensaje final */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
        }

        .card {
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            max-width: 80%;
            animation: slideUp 1s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 { color: #d63384; font-size: 1.5rem; margin-bottom: 15px; }
        p { color: #666; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="rose-bouquet" id="bouquet">
            <div class="flower" style="top:0; left:110px;"></div>
            <div class="flower" style="top:40px; left:60px;"></div>
            <div class="flower" style="top:40px; left:160px;"></div>
            <div class="flower" style="top:90px; left:30px;"></div>
            <div class="flower" style="top:90px; left:110px;"></div>
            <div class="flower" style="top:90px; left:190px;"></div>
            <div class="flower" style="top:150px; left:70px;"></div>
            <div class="flower" style="top:150px; left:150px;"></div>
            <div class="stems"></div>
            
            <div id="white-ribbon" onclick="openMessage()">Pulsa aquí 🏷️</div>
        </div>
    </div>

    <div id="overlay">
        <div class="card">
            <h1>Un ramo para la persona más importante del mundo.</h1>
            <p>Te quiero mucho 🤍</p>
            <button onclick="location.reload()" style="margin-top:20px; border:none; background:none; color:#ccc; cursor:pointer;">Ver de nuevo</button>
        </div>
    </div>

    <script>
        window.onload = () => {
            const bouquet = document.getElementById('bouquet');
            const ribbon = document.getElementById('white-ribbon');

            // 1. Iniciar crecimiento
            setTimeout(() => {
                bouquet.classList.add('grow');
            }, 500);

            // 2. Aparecer el lazo blanco al terminar
            setTimeout(() => {
                ribbon.classList.add('show');
            }, 4500);
        };

        function openMessage() {
            document.getElementById('overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
